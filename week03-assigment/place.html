<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peru</title>
    <link rel="stylesheet" href="sytles/styles.css">
    <script src="scripts/script.js" defer></script>
    <meta name="description" content="Page that describes Peru">
    <meta name="author" content="Diego De La Cruz">
</head>
<body>
    <header>
        <h1>Peru</h1>
    </header>
    <main>
        <picture>
            <source srcset="images/machu-picchu-peru.jpg" media="(min-width: 768px)">
            <img src="images/peru-small.webp" alt="Peru landscape">
        </picture>
        <section class="data">
            <h2>Data</h2>
            <p>Area: 1,285,216 km²</p>
            <p>Population: 33 million</p>
            <p>Capital: Lima</p>
            <p>Language: Spanish</p>
            <p>Currency: Sol</p>
            <p>Time Zone:UTC -5</p>
        </section>
        <section class="weather">
            <h2>Weather</h2>
            <p>Temperature: <span id="temp">8</span>C</p>
            <p>Wind Speed: <span id="wind">10</span>km/h</p>
            <p>Wind Child: <span id="windchill"></span></p>
        </section>
    </main>

    <footer>
        <p>© <span id="year"></span> | Peru</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
